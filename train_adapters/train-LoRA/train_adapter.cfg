# Base model to fine-tune
BASE_MODEL="meta-llama/Llama-3.2-1B"

# Colon-separated list of HuggingFace dataset names to train adapters on
DATA_SETS="tatsu-lab/alpaca:databricks/databricks-dolly-15k"

# Dataset column names (must be the same across all datasets, or adjust per dataset in the script)
INSTRUCTION_COLUMN="instruction"
LABEL_COLUMN="output"

# LoRA hyperparameters
LORA_RANK=16
LORA_ALPHA=32

# Training hyperparameters
LEARNING_RATE=2e-4
EPOCHS=10
BATCH_SIZE=4
MAX_LENGTH=512

# Root directory where each adapter will be saved (a subdirectory per dataset is created)
ADAPTER_SAVE_ROOT="./adapters"
